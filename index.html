<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A cute Valentine's Day page to ask someone to be your Valentine!">
  <meta name="theme-color" content="#ffd0e5">
  <title>Will you be my Date?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    .gradient-background {
      background: linear-gradient(180deg, #ffd0e5 0%, #ffe8f2 36%, #ffffff 100%);
      min-height: 100vh;
    }

    .bounce {
      animation: bounce 2s ease infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-20px);
      }
      60% {
        transform: translateY(-10px);
      }
    }
  </style>
  <!-- Preload images so transitions feel instant -->
  <link rel="preload" as="image" href="./Yes/Main start.gif">
  <link rel="preload" as="image" href="./Yes/woohooo.gif">
  <link rel="preload" as="image" href="./Yes/Lets go jumping.gif">
  <link rel="preload" as="image" href="./Yes/Good Choice (food).gif">
  <link rel="preload" as="image" href="./Yes/funny and best.gif">
  <link rel="preload" as="image" href="./Yes/end.gif">
  <link rel="preload" as="image" href="./No/1 Are u sure.gif">
  <link rel="preload" as="image" href="./No/2 please.gif">
  <link rel="preload" as="image" href="./No/3 Don't do this.gif">
  <link rel="preload" as="image" href="./No/4 breaking heart.gif">
  <link rel="preload" as="image" href="./No/5 I'm gone cry.gif">
  <link rel="preload" as="image" href="./No/6 bye.gif">
</head>
<body class="gradient-background">
  <main class="flex items-center justify-center h-screen">
    <section class="flex flex-col items-center p-4">
      <img
        id="imageDisplay"
        src="./Yes/Main start.gif"
        alt="Main start image"
        class="rounded-md h-[300px] object-cover"
      />
      <h1 id="valentineQuestion" class="text-4xl font-bold italic text-[#bd1e59] my-4">
        Anisha, will you go on a date with me?
      </h1>
      <div id="responseButtons" class="flex gap-4 pt-5 items-center">
        <button
          id="yesButton"
          class="bounce inline-flex items-center justify-center rounded-md text-xl font-medium cursor-pointer px-4 py-2 bg-green-500 text-white transition-all duration-300 ease-in-out hover:bg-green-400 min-h-12 min-w-[75px]"
        >
          Yes
        </button>
        <button
          id="noButton"
          class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-xl font-medium cursor-pointer px-4 py-2 bg-red-500 text-white transition-colors hover:bg-red-700 h-12 min-w-[75px]"
        >
          No
        </button>
      </div>
    </section>
  </main>

  <script>
    (() => {
      // DOM references
      const yesButton = document.getElementById('yesButton');
      const noButton = document.getElementById('noButton');
      const imageDisplay = document.getElementById('imageDisplay');
      const valentineQuestion = document.getElementById('valentineQuestion');
      const responseButtons = document.getElementById('responseButtons');

      // Configuration
      const GROWTH_PER_CLICK = 35;
      const FONT_GROWTH_PER_CLICK = 25;
      const MAX_NO_CLICKS = 6;

      const NO_IMAGE_PATHS = [
        './No/1 Are u sure.gif',
        './No/2 please.gif',
        './No/3 Don\'t do this.gif',
        './No/4 breaking heart.gif',
        './No/5 I\'m gone cry.gif',
        './No/6 bye.gif',
      ];

      const YES_IMAGE_PATHS = [
        './Yes/woohooo.gif',
        './Yes/Lets go jumping.gif',
        './Yes/Good Choice (food).gif',
        './Yes/funny and best.gif',
        './Yes/end.gif',
      ];

      const NO_BUTTON_MESSAGES = [
        'No',
        'Are you sure?',
        'Pookie please',
        "Don't do this to me :(",
        "You're breaking my heart",
        "I'm gonna cry...",
      ];

      const YES_BUTTON_MESSAGES = [
        'Yes',
        'Woohoo!',
        'Lets go!!',
        'Good choice!!',
        'You\'re the best and funniest person',
      ];

      // State
      let noClickCount = 0;
      let yesClickCount = 0;
      let noButtonHeight = 48;
      let noButtonWidth = 80;
      let noFontSize = 20;
      let yesButtonHeight = 48;
      let yesButtonWidth = 80;
      let yesFontSize = 20;

      noButton.addEventListener('click', () => {
        if (noClickCount >= MAX_NO_CLICKS) return;

        noClickCount++;

        // Update image and alt text
        imageDisplay.src = NO_IMAGE_PATHS[noClickCount - 1];
        imageDisplay.alt = 'NO response image';

        // Reset YES counter and grow the "Yes" button box only (not text)
        yesClickCount = 0;
        yesButtonHeight += GROWTH_PER_CLICK;
        yesButtonWidth += GROWTH_PER_CLICK;

        yesButton.style.height = `${yesButtonHeight}px`;
        yesButton.style.width = `${yesButtonWidth}px`;

        // Update "No" button text with increasingly desperate messages
        noButton.textContent = NO_BUTTON_MESSAGES[noClickCount];

        // After 6 NO clicks, hide buttons and question, show bye image
        if (noClickCount === MAX_NO_CLICKS) {
          responseButtons.style.display = 'none';
          valentineQuestion.style.display = 'none';
        }
      });

      yesButton.addEventListener('click', () => {
        if (yesClickCount >= YES_IMAGE_PATHS.length) return;

        // Update image and alt text
        imageDisplay.src = YES_IMAGE_PATHS[yesClickCount];
        imageDisplay.alt = 'YES celebration image';

        // Reset NO counter and grow the "Yes" button box only (not text)
        noClickCount = 0;
        yesButtonHeight += GROWTH_PER_CLICK;
        yesButtonWidth += GROWTH_PER_CLICK;

        yesButton.style.height = `${yesButtonHeight}px`;
        yesButton.style.width = `${yesButtonWidth}px`;

        // Update "Yes" button text with happy messages
        yesClickCount++;
        if (yesClickCount < YES_BUTTON_MESSAGES.length) {
          yesButton.textContent = YES_BUTTON_MESSAGES[yesClickCount];
        }

        // After last YES click, hide buttons and question
        if (yesClickCount >= YES_IMAGE_PATHS.length) {
          responseButtons.style.display = 'none';
          valentineQuestion.style.display = 'none';
        }

        // Heart-shaped confetti for a valentine theme
        const heart = confetti.shapeFromPath({
          path: 'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z',
        });

        const defaults = { spread: 360, ticks: 100, gravity: 0, decay: 0.94, startVelocity: 20, shapes: [heart], colors: ['#ff69b4', '#ff1493', '#ff6b81', '#e84393'] };

        confetti({ ...defaults, particleCount: 50, scalar: 2 });
        confetti({ ...defaults, particleCount: 25, scalar: 3 });
        confetti({ ...defaults, particleCount: 10, scalar: 4 });
      });
    })();
  </script>
</body>
</html>
